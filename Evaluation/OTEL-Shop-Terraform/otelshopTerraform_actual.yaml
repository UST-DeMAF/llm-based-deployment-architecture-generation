components:
- DefaultDockerEngine:
    artifacts: []
    description: null
    operations: []
    properties:
    - imagePullPolicy: IfNotPresent
    type: DockerEngine
- OpenSearch:
    artifacts: []
    description: null
    operations: []
    properties:
    - access: proxy
    - database: otel
    - editable: 'True'
    - flavor: opensearch
    - imagePullPolicy: IfNotPresent
    - isDefault: 'False'
    - logLevelField: severity
    - logMessageField: body
    - name: OpenSearch
    - pplEnabled: 'True'
    - timeField: observedTimestamp
    - type: grafana-opensearch-datasource
    - url: http://opensearch:9200/
    - version: 2.16.0
    type: grafana-opensearch-datasource
- grafana:
    artifacts: []
    description: null
    operations: []
    properties:
    - datasource:
        editable: true
        isDefault: true
        jsonData:
          exemplarTraceIdDestinations:
          - datasourceUid: webstore-traces
            name: trace_id
          - name: trace_id
            url: http://localhost:8080/jaeger/ui/trace/$${__value.raw}
            urlDisplayLabel: View in Jaeger UI
        name: Prometheus
        type: prometheus
        uid: webstore-metrics
        url: http://prometheus:9090
    - imagePullPolicy: IfNotPresent
    - name: grafana
    type: grafana-SoftwareApplication
- otelcol:
    artifacts:
    - docker_image:
        fileURI: https://hub.docker.com/_/otel
        name: otel/opentelemetry-collector-contrib:0.108.0
    description: null
    operations: []
    properties:
    - env.OTEL_COLLECTOR_HOST: otelcol
    - env.OTEL_COLLECTOR_PORT_GRPC: '4317'
    - env.OTEL_COLLECTOR_PORT_HTTP: '4318'
    - imagePullPolicy: IfNotPresent
    - name: otelcol
    - network_mode: bridge
    - networks_advanced.name: open-telemetry-network
    - ports.internal: '4318'
    - restart: unless-stopped
    type: otelcol-SoftwareApplication
- otelcol-config.yml:
    artifacts:
    - file:
        fileURI: file:///app/project_folder/Evaluation/OTEL-Shop-Terraform/deploymentModel/files/otelcollector/otelcol-config.yml
    description: null
    operations: []
    properties:
    - connectors: null
    - exporters: null
    - imagePullPolicy: IfNotPresent
    - processors: null
    - receivers: null
    - service: null
    type: otelcol-ConfigFile
- prometheus:
    artifacts:
    - docker_image:
        fileURI: quay.io/prometheus/prometheus:v2.54.1
        name: prometheus:v2.54.1
    - prometheus_config:
        fileURI: /app/project_folder/Evaluation/OTEL-Shop-Terraform/deploymentModel/files/prometheus/prometheus-config.yaml
        name: prometheus-config.yaml
    description: null
    operations: []
    properties:
    - imagePullPolicy: IfNotPresent
    type: prometheus-SoftwareApplication
