---
properties: []
components:
  - t2store:
      type: "azurerm_kubernetes_cluster"
      description: null
      properties:
        - tags: "{\"Environment\":\"Production\"}"
        - location: "West Europe"
        - name: "t2store-aks1"
        - resource_group_name: "t2store-resources"
        - dns_prefix: "t2storeaks1"
        - identity.type: "SystemAssigned"
        - default_node_pool.node_count: "1"
        - default_node_pool.name: "default_node"
        - default_node_pool.vm_size: "standard_b4ms"
      operations: []
      artifacts: []
  - MicrosoftAzure:
      type: "CloudProvider"
      description: null
      properties: []
      operations: []
      artifacts: []
  - mongo-mongodb:
      type: "mongodb-DatabaseSystem"
      description: null
      properties:
        - exposedPort_mongodb: "27017:27017"
        - MONGODB_DISABLE_SYSTEM_LOG: "no"
        - ALLOW_EMPTY_PASSWORD: "yes"
        - BITNAMI_DEBUG: "false"
        - MONGODB_PORT_NUMBER: "27017"
        - MONGODB_SYSTEM_LOG_VERBOSITY: "0"
        - MONGODB_ENABLE_IPV6: "no"
        - MONGODB_DISABLE_JAVASCRIPT: "no"
        - MONGODB_ENABLE_JOURNAL: "yes"
        - MONGODB_ENABLE_DIRECTORY_PER_DB: "no"
        - containerPort_mongodb: 27017
        - imagePullPolicy: "IfNotPresent"
      operations: []
      artifacts:
        - docker_image:
            name: "docker.io/bitnami/mongodb:8.0.11-debian-12-r0"
            fileURI: "https://hub.docker.com/r/bitnami/mongodb"
  - mongo-mongodb-datadir-volume:
      type: "Storage"
      description: null
      properties:
        - storage_size: "8Gi"
      operations: []
      artifacts: []
  - backend:
      type: "modulith-SoftwareApplication"
      description: null
      properties:
        - exposedPort: "80:8080"
        - T2_COMPUTATION_SIMULATOR_ENABLED: "FALSE"
        - T2_INVENTORY_SET_UNITS_TO_MAX: "FALSE"
        - T2_CART_TTL: "0"
        - SPRING_DATASOURCE_USERNAME: "postgres"
        - SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/postgres"
        - T2_COMPUTATION_SIMULATOR_PI_TOTAL_POINTS: "1000000000"
        - SPRING_PROFILES_ACTIVE: "prod"
        - T2_PAYMENT_PROVIDER_ENABLED: "TRUE"
        - T2_PAYMENT_PROVIDER_DUMMY_URL: "http://creditinstitute/pay"
        - MONGO_HOST: "mongo-mongodb"
        - T2_INVENTORY_SIZE: "25"
        - SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
        - SPRING_DATASOURCE_PASSWORD: "postgres"
        - T2_INVENTORY_TTL: "0"
        - T2_INVENTORY_TASKRATE: "0"
        - T2_PAYMENT_PROVIDER_TIMEOUT: "5"
        - T2_CART_TASKRATE: "0"
        - containerPort: 8080
        - imagePullPolicy: "Always"
      operations: []
      artifacts:
        - docker_image:
            name: "t2project/modulith:main"
            fileURI: "https://hub.docker.com/r/t2project/modulith"
  - creditinstitute:
      type: "creditinstitute-SoftwareApplication"
      description: null
      properties:
        - exposedPort: "80:8080"
        - T2_JAEGER_ENABLED: "FALSE"
        - T2_JAEGER_HOST: "simplest-agent"
        - containerPort: 8080
        - imagePullPolicy: "Always"
      operations: []
      artifacts:
        - docker_image:
            name: "t2project/creditinstitute:main"
            fileURI: "https://hub.docker.com/r/t2project/creditinstitute"
  - postgres:
      type: "postgres-DatabaseSystem"
      description: null
      properties:
        - exposedPort: "5432:5432"
        - POSTGRES_USER: "postgres"
        - POSTGRES_PASSWORD: "postgres"
        - containerPort: 5432
        - imagePullPolicy: "IfNotPresent"
      operations: []
      artifacts:
        - docker_image:
            name: "postgres:12.16-bullseye"
            fileURI: "https://hub.docker.com/_/postgres"
  - postgres-postgres-storage-volume:
      type: "Storage"
      description: null
      properties:
        - storage_size: "1Gi"
      operations: []
      artifacts: []
relations:
  - t2store_HostedOn_MicrosoftAzure:
      type: "HostedOn"
      description: null
      source: "t2store"
      target: "MicrosoftAzure"
      properties: []
      operations: []
  - mongo-mongodb_HostedOn_t2store:
      type: "HostedOn"
      description: null
      source: "mongo-mongodb"
      target: "t2store"
      properties: []
      operations: []
  - mongo-mongodb-datadir-mount:
      type: "AttachesTo"
      description: null
      source: "mongo-mongodb-datadir-volume"
      target: "mongo-mongodb"
      properties:
        - location: "/bitnami/mongodb"
      operations: []
  - mongo-mongodb-datadir-volume_HostedOn_t2store:
      type: "HostedOn"
      description: null
      source: "mongo-mongodb-datadir-volume"
      target: "t2store"
      properties: []
      operations: []
  - backend_ConnectsTo_postgres:
      type: "ConnectsTo"
      description: null
      source: "backend"
      target: "postgres"
      properties: []
      operations: []
  - backend_ConnectsTo_creditinstitute:
      type: "ConnectsTo"
      description: null
      source: "backend"
      target: "creditinstitute"
      properties: []
      operations: []
  - backend_ConnectsTo_mongo-mongodb:
      type: "ConnectsTo"
      description: null
      source: "backend"
      target: "mongo-mongodb"
      properties: []
      operations: []
  - backend_HostedOn_t2store:
      type: "HostedOn"
      description: null
      source: "backend"
      target: "t2store"
      properties: []
      operations: []
  - creditinstitute_HostedOn_t2store:
      type: "HostedOn"
      description: null
      source: "creditinstitute"
      target: "t2store"
      properties: []
      operations: []
  - postgres_HostedOn_t2store:
      type: "HostedOn"
      description: null
      source: "postgres"
      target: "t2store"
      properties: []
      operations: []
  - postgres-postgres-storage-mount:
      type: "AttachesTo"
      description: null
      source: "postgres-postgres-storage-volume"
      target: "postgres"
      properties:
        - location: "/var/lib/postgresql/data"
      operations: []
  - postgres-postgres-storage-volume_HostedOn_t2store:
      type: "HostedOn"
      description: null
      source: "postgres-postgres-storage-volume"
      target: "t2store"
      properties: []
      operations: []
component_types:
  - BaseType:
      extends: "-"
      description: null
      properties: []
      operations: []
  - ContainerPlatform:
      extends: "BaseType"
      description: null
      properties: []
      operations: []
  - KubernetesCluster:
      extends: "ContainerPlatform"
      description: null
      properties: []
      operations: []
  - azurerm_kubernetes_cluster:
      extends: "KubernetesCluster"
      description: null
      properties:
        - tags:
            type: "STRING"
            required: false
            default_value: "{\"Environment\":\"Production\"}"
        - location:
            type: "STRING"
            required: false
            default_value: "West Europe"
        - name:
            type: "STRING"
            required: false
            default_value: "t2store-aks1"
        - resource_group_name:
            type: "STRING"
            required: false
            default_value: "t2store-resources"
        - dns_prefix:
