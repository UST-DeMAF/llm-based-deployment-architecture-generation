    - Pull otelcol image:
        artifacts:
        - bash:
            fileURI: '-'
            name: /bin/sh docker pull otel/opentelemetry-collector-contrib:0.108.0
        - docker_image:
            fileURI: otel/opentelemetry-collector-contrib:0.108.0
            name: otel/opentelemetry-collector-contrib:0.108.0
    - Pull the latest Docker image:
        artifacts:
        - bash:
            fileURI: '-'
            name: /bin/sh docker pull otel/opentelemetry-collector-contrib:0.108.0
        - docker_image:
            fileURI: otel/opentelemetry-collector-contrib:0.108.0
            name: otel/opentelemetry-collector-contrib:0.108.0
    properties:
    - ENVOY_PORT: '8080'
    - OTEL_COLLECTOR_HOST: otelcol
    - OTEL_COLLECTOR_PORT_GRPC: '4317'
    - OTEL_COLLECTOR_PORT_HTTP: '4318'
    - command: '"--config=/etc/otelcol-config.yml" "--config=/etc/otelcol-config-extras.yml"'
    - connectors:
        spanmetrics: null
    - exporters:
        debug: null
        opensearch:
          http:
            endpoint: http://opensearch:9200
            tls:
              insecure: true
          logs_index: otel
        otlp:
          endpoint: jaeger:4317
          tls:
            insecure: true
        otlphttp/prometheus:
          endpoint: http://prometheus:9090/api/v1/otlp
          tls:
            insecure: true
    - image_name: otel/opentelemetry-collector-contrib:0.108.0
    - memory_limit: 200M
    - port: '4318'
    - ports:
      - '4317'
      - '4318'
    - processors:
        batch: null
        transform:
          error_mode: ignore
          trace_statements:
          - context: span
            statements:
            - replace_match(name, "GET /api/products/*", "GET /api/products/{productId}")
            - replace_pattern(name, "\\?.*", "")
    - receivers:
        docker_stats:
          endpoint: unix:///var/run/docker.sock
        httpcheck/frontendproxy:
          targets:
          - endpoint: http://frontendproxy:${env:ENVOY_PORT}
        otlp:
          protocols:
            grpc:
              endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_GRPC}
            http:
              cors:
                allowed_origins:
                - http://*
                - https://*
              endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
        prometheus:
          config:
            scrape_configs:
            - job_name: otelcol
              scrape_interval: 10s
              static_configs:
              - targets:
                - 0.0.0.0:8888
        redis:
          collection_interval: 10s
          endpoint: valkey-cart:6379
          username: valkey
    - service:
        pipelines:
          logs:
            exporters:
            - debug
            - opensearch
            processors:
            - batch
            receivers:
            - otlp
          metrics:
            exporters:
            - debug
            - otlphttp/prometheus
            processors:
            - batch
            receivers:
            - docker_stats
            - httpcheck/frontendproxy
            - otlp
            - prometheus
            - redis
            - spanmetrics
          traces:
            exporters:
            - debug
            - otlp
            - spanmetrics
            processors:
            - batch
            - transform
            receivers:
            - otlp
    - service_name: otelcol
    - user: 0:0
    - volumes:
      - ./roles/otelcol/files/otelcol-config-extras.yml:/etc/otelcol-config-extras.yml
      - ./roles/otelcol/files/otelcol-config.yml:/etc/otelcol-config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    type: otelcol-SoftwareApplication
