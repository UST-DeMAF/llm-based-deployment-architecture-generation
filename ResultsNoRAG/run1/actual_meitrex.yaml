components:
- defaultKubernetesCluster:
    artifacts: []
    description: null
    operations: []
    properties: []
    type: DefaultKubernetesCluster
- gits_content_service:
    artifacts:
    - docker_image:
        fileURI: https://ghcr.io/it-rex-platform/content_service
        name: ghcr.io/it-rex-platform/content_service:latest
    description: null
    operations: []
    properties:
    - imagePullPolicy: Always
    - SPRING_DATASOURCE_URL: jdbc:postgresql://content-service-db-postgresql:5432/content-service
    - SPRING_DATASOURCE_USERNAME: gits
    - SPRING_DATASOURCE_PASSWORD: random_password.content_service_db_pass.result
    type: content_service-SoftwareApplication
- content-service-db-postgresql:
    artifacts:
    - docker_image:
        fileURI: https://hub.docker.com/r/bitnami/postgresql
        name: bitnami/postgresql:latest
    description: null
    operations: []
    properties:
    - imagePullPolicy: IfNotPresent
    - database: content-service
    - username: gits
    - password: random_password.content_service_db_pass.result
    - exposedPort: 5432:5432
    type: postgresql-DatabaseSystem
- gits_course_service_hpa:
    artifacts: []
    operations: []
    properties:
    - name: kubernetes_deployment.gits_course_service.metadata[0].name
    - namespace: kubernetes_namespace.gits.metadata[0].name
    - min_replicas: 1
    - max_replicas: 10
    - scale_target_ref.api_version: apps/v1
    - scale_target_ref.kind: Deployment
    - scale_target_ref.name: kubernetes_deployment.gits_course_service.metadata[0].name
    - metric.type: Resource
    - metric.resource.name: cpu
    - metric.resource.target.type: Utilization
    - metric.resource.target.average_utilization: 300
    type: kubernetes_horizontal_pod_autoscaler_v2
- dapr:
    artifacts: []
    operations: []
    properties:
    - name: dapr
    - repository: https://dapr.github.io/helm-charts
    - chart: dapr
    - namespace: kubernetes_namespace.gits.metadata[0].name
    type: dapr-SoftwareApplication
- redis:
    artifacts: []
    operations: []
    properties:
