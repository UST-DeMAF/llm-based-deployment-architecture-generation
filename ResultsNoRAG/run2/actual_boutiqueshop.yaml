components:
- GoogleCloudPlatform:
    artifacts: []
    operations: []
    properties: []
    type: CloudProvider
- my_cluster:
    artifacts: []
    operations: []
    properties:
    - name: online-boutique
    - location: us-central1
    - enable_autopilot: true
    type: google_container_cluster
- redis-cart:
    artifacts: []
    operations: []
    properties:
    - name: redis-cart
    - memory_size_gb: 1
    - region: us-central1
    - redis_version: REDIS_7_0
    - project: var.gcp_project_id
    type: redis-DatabaseSystem
- adservice:
    artifacts:
    - docker_image:
        fileURI: https://us-central1-docker.pkg.dev/google-samples/microservices-demo/adservice
        name: us-central1-docker.pkg.dev/google-samples/microservices-demo/adservice:v0.10.5
    description: null
    operations: []
    properties:
    - imagePullPolicy: IfNotPresent
    - PORT: '9555'
    - containerPort: 9555
    type: adservice-SoftwareApplication
- cartservice:
    artifacts:
    - docker_image:
        fileURI: https://us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice
        name: us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice:v0.10.5
    operations: []
    properties:
    - imagePullPolicy: IfNotPresent
    - REDIS_ADDR: redis-cart:6379
    - containerPort: 7070
    type: cartservice-SoftwareApplication
- checkoutservice:
    artifacts:
