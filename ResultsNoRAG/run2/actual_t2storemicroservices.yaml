- DefaultKubernetesCluster:
    artifacts: []
    operations: []
    properties: []
    type: DefaultKubernetesCluster
- postgres-inventory-datadir:
    artifacts: []
    operations: []
    properties:
    - storage_size: 1Gi
    type: Storage
- postgres-inventory:
    artifacts:
    - docker_image:
        fileURI: https://hub.docker.com/r/eventuateio/eventuate-tram-sagas-postgres
        name: eventuateio/eventuate-tram-sagas-postgres:0.23.0.RELEASE
    operations: []
    properties:
    - imagePullPolicy: IfNotPresent
    - POSTGRES_DB: inventory
    - POSTGRES_PASSWORD: inventory
    - POSTGRES_USER: inventory
    - USE_DB_ID: 'true'
    - containerPort: 5432
    type: postgres-DatabaseSystem
- ui:
    artifacts:
    - docker_image:
        fileURI: https://hub.docker.com/r/t2project/ui
        name: t2project/ui:main
    operations: []
    properties:
