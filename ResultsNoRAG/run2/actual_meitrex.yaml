        fileURI: https://hub.docker.com/r/bitnami/postgresql
        name: bitnami/postgresql:latest
    description: null
    operations: []
    properties:
    - name: skilllevel-service-db
    - repository: oci://registry-1.docker.io/bitnamicharts
    - chart: postgresql
    - namespace: kubernetes_namespace.gits.metadata[0].name
    - global.postgresql.auth.database: skilllevel-service
    - postgres.auth.enablePostgresUser: 'false'
    - global.postgresql.auth.username: gits
    - global.postgresql.auth.password: random_password.skilllevel_service_db_pass.result
    type: postgresql-DatabaseSystem
- user_service_db-postgresql:
    artifacts: []
    operations: []
    properties:
    - name: user-service-db
    - repository: oci://registry-1.docker.io/bitnamicharts
    - chart: postgresql
    - namespace: gits
    - set.global.postgresql.auth.database: user-service
    - set.postgres.auth.enablePostgresUser: 'false'
    - set.global.postgresql.auth.username: gits
    - set.global.postgresql.auth.password: random_password.user_service_db_pass.result
    type: postgresql-DatabaseSystem
- gits_user_service:
    artifacts:
    - docker_image:
        fileURI: https://ghcr.io
        name: ghcr.io/it-rex-platform/user_service:latest
    operations: []
    properties:
    - imagePullPolicy: Always
    - SPRING_DATASOURCE_URL: jdbc:postgresql://user-service-db-postgresql:5432/user-service
    - SPRING_DATASOURCE_USERNAME: gits
    - SPRING_DATASOURCE_PASSWORD: random_password.user_service_db_pass.result
    - KEYCLOAK_URL: http://keycloak:80/keycloak
    - KEYCLOAK_PASSWORD: var.keycloak_admin_pw
    type: user_service-SoftwareApplication
